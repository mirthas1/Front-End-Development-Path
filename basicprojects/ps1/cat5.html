<!DOCTYPE html>
<html>
    <head><title>List Examples</title></head>
    <body>
        <h1>List types in HTML</h1>
        <h3>unordered list</h3>
        <ul style="list-style-type: square;">
            <li>kusumgu</li>
            <li>jumuthui</li>
            <li>jambopenuts</li>
        </ul>
        <h3>ordered list</h3>
        <ol>
            <li>jumbuku</li>
            <li>maraths</li>
            <li>murthath</li>
        </ol>
        <hr>
        <h3>discriptive listing</h3>

        <dl>
            <dt><strong>OUSL :</strong></dt>
            <dd>open university of srilanka</dd>
            <dt><strong>SEUSL :</strong></dt>
            <dd>south eaastern university of srilanka</dd>
        </dl>
    </body>
</html>
